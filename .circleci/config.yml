version: 2.1

# CI has moved to GitHub Actions in .github/workflows/ci.yml.
# Keeping an intentionally no-op CircleCI workflow stops checkout failures
# from reporting red during the transition without running duplicate gates.
jobs:
  transition:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: CircleCI retired in favor of GitHub Actions
          command: |
            echo "GitHub Actions is the active CI pipeline for this repository."
            echo "See .github/workflows/ci.yml for the build and test gates."

workflows:
  retired:
    jobs:
      - transition
